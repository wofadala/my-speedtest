<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JSON在线工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f5f6f8;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card {
            max-width: 1000px;
            width: 100%;
            background: #e8f1fb;
            border-radius: 20px;
            padding: 28px 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            border: 2px solid #b0cde8;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .sub {
            text-align: center;
            color: #5a6070;
            font-size: 13px;
            margin-bottom: 22px;
        }

        textarea {
            width: 100%;
            height: 220px;
            background: #fff;
            border: 1px solid #b0cde8;
            border-radius: 10px;
            padding: 14px 16px;
            color: #1a1a2e;
            font-family: 'SF Mono', 'Consolas', 'Microsoft YaHei', monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
            transition: border 0.2s;
        }

        textarea:focus {
            border-color: #4a90d9;
        }

        #jsonInput::placeholder {
            color: #a0aab4;
            font-style: italic;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin: 16px 0;
            flex-wrap: nowrap; /* 👈 关键：禁止换行 */
        }

        button {
            background: #4a90d9;
            border: none;
            padding: 12px 6px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 0; /* 👈 允许按钮在窄屏下压缩 */
            letter-spacing: 0.5px;
            white-space: nowrap; /* 👈 按钮文字不换行 */
        }

        button:hover {
            background: #3d7ec4;
        }

        .result-label {
            color: #5a6070;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .result-box {
            background: #fff;
            border: 1px solid #b0cde8;
            border-radius: 10px;
            padding: 14px 16px;
            min-height: 140px;
            color: #1a1a2e;
            font-family: 'SF Mono', 'Consolas', 'Microsoft YaHei', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
        }

        .result-box.success {
            color: #0d8a4e;
            background: #f0faf4;
            border-color: #a3d9b8;
        }

        .result-box.error {
            color: #c0392b;
            background: #fef5f5;
            border-color: #f5c6cb;
        }

        footer {
            text-align: center;
            font-size: 11px;
            color: #8a8f9f;
            margin-top: 14px;
        }

        /* 👇 手机端进一步缩小按钮字号 */
        @media (max-width: 480px) {
            button {
                font-size: 12px;
                padding: 10px 4px;
                letter-spacing: 0;
            }
            .card {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🔧 JSON 格式化工具</h1>
    <div class="sub">格式化 · 压缩 · 校验</div>

    <textarea id="jsonInput" placeholder="请输入 JSON 数据……例如：{&quot;name&quot;:&quot;张三&quot;,&quot;age&quot;:25}"></textarea>

    <div class="button-group">
        <button id="formatBtn">✨ 格式化</button>
        <button id="compressBtn">📦 压缩</button>
        <button id="validateBtn">🔍 校验</button>
    </div>

    <div class="result-label">📄 输出结果</div>
    <div class="result-box" id="output">等待输入……</div>
    <footer>支持标准JSON格式 · 自动检测错误位置</footer>
</div>

<script>
    const inputArea = document.getElementById('jsonInput');
    const outputDiv = document.getElementById('output');

    function formatJSON() {
        const raw = inputArea.value.trim();
        if (!raw) {
            outputDiv.innerHTML = '⚠️ 请输入 JSON 数据';
            outputDiv.className = 'result-box error';
            return;
        }
        try {
            const parsed = JSON.parse(raw);
            const formatted = JSON.stringify(parsed, null, 2);
            outputDiv.textContent = formatted;
            outputDiv.className = 'result-box success';
        } catch (e) {
            outputDiv.textContent = '❌ JSON 格式错误：' + e.message;
            outputDiv.className = 'result-box error';
        }
    }

    function compressJSON() {
        const raw = inputArea.value.trim();
        if (!raw) {
            outputDiv.innerHTML = '⚠️ 请输入 JSON 数据';
            outputDiv.className = 'result-box error';
            return;
        }
        try {
            const parsed = JSON.parse(raw);
            const compressed = JSON.stringify(parsed);
            outputDiv.textContent = compressed;
            outputDiv.className = 'result-box success';
        } catch (e) {
            outputDiv.textContent = '❌ JSON 格式错误：' + e.message;
            outputDiv.className = 'result-box error';
        }
    }

    function validateJSON() {
        const raw = inputArea.value.trim();
        if (!raw) {
            outputDiv.innerHTML = '⚠️ 请输入 JSON 数据';
            outputDiv.className = 'result-box error';
            return;
        }
        try {
            JSON.parse(raw);
            outputDiv.textContent = '✅ JSON 格式正确！';
            outputDiv.className = 'result-box success';
        } catch (e) {
            outputDiv.textContent = '❌ 校验失败：' + e.message;
            outputDiv.className = 'result-box error';
        }
    }

    document.getElementById('formatBtn').addEventListener('click', formatJSON);
    document.getElementById('compressBtn').addEventListener('click', compressJSON);
    document.getElementById('validateBtn').addEventListener('click', validateJSON);
</script>
</body>
</html>
