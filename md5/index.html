<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD5加密</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            width: 100%;
            max-width: 550px;
            background: #e8f1fb;
            border-radius: 20px;
            padding: 28px 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            border: 2px solid #b0cde8;
        }
        h1 { font-size: 24px; color: #1a1a2e; text-align: center; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: #5a6070; text-align: center; margin-bottom: 22px; }
        .section { margin-bottom: 16px; }
        .section label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #5a6070;
            margin-bottom: 6px;
        }
        textarea {
            width: 100%;
            height: 90px;
            border: 1px solid #b0cde8;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            font-family: 'SF Mono', 'Consolas', 'Microsoft YaHei', monospace;
            resize: vertical;
            color: #1a1a2e;
            background: #fff;
            transition: border 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #4a90d9;
        }
        #inputText::placeholder {
            color: #a0aab4;
            font-style: italic;
        }
        .algo-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .algo-btn {
            flex: 1;
            padding: 10px 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            background: #fff;
            color: #5a6070;
            border: 2px solid #dce3eb;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .algo-btn:hover { border-color: #4a90d9; background: #f0f6fd; }
        .algo-btn.active {
            background: #4a90d9;
            color: #fff;
            border-color: #4a90d9;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        button {
            flex: 1;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .btn-encrypt {
            background: #4a90d9;
            color: #fff;
        }
        .btn-encrypt:hover { background: #3d7ec4; }
        .btn-copy {
            background: #4a90d9;
            color: #fff;
            flex: 0.5;
        }
        .btn-copy:hover { background: #3d7ec4; }
        .btn-clear {
            background: #dce3eb;
            color: #5a6070;
            flex: 0.5;
        }
        .btn-clear:hover { background: #c8d3de; }
        .result-input {
            width: 100%;
            height: 60px; /* 固定高度，防止长文本撑开容器 */
            overflow-y: auto; /* 文本超出时出现滚动条 */
            padding: 14px 16px;
            border: 1px solid #b0cde8;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'SF Mono', 'Consolas', monospace;
            color: #1a1a2e;
            background: #fff;
            cursor: pointer;
            transition: border 0.2s;
            word-break: break-all;
            text-align: center;
            line-height: 1.4;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result-input:hover { background: #fafbfc; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1a1a2e;
            color: #fff;
            padding: 10px 22px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 700;
            z-index: 200;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .uppercase-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #5a6070;
            margin-top: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 MD5 / SHA 加密</h1>
        <p class="subtitle">输入文字，一键生成加密哈希值</p>

        <div class="section">
            <label>📥 输入内容</label>
            <textarea id="inputText" placeholder="输入要加密的文字……"></textarea>
        </div>

        <label>🔢 选择加密算法</label>
        <div class="algo-row">
            <div class="algo-btn active" onclick="selectAlgo('MD5', this)">MD5</div>
            <div class="algo-btn" onclick="selectAlgo('SHA-1', this)">SHA-1</div>
            <div class="algo-btn" onclick="selectAlgo('SHA-256', this)">SHA-256</div>
        </div>

        <div class="btn-row">
            <button class="btn-encrypt" onclick="doEncrypt()">生成加密</button>
            <button class="btn-copy" onclick="copyResult()">复制结果</button>
            <button class="btn-clear" onclick="clearAll()">清空</button>
        </div>

        <div class="section">
            <label>📤 加密结果</label>
            <div class="result-input" id="resultBox" onclick="copyResult()">等待生成……</div>
            <label class="uppercase-label">
                <input type="checkbox" id="uppercaseCheck" onchange="doEncrypt()"> 大写输出
            </label>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentAlgo = 'MD5';

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 1500);
        }

        function selectAlgo(algo, el) {
            currentAlgo = algo;
            document.querySelectorAll('.algo-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const inputText = document.getElementById('inputText').value.trim();
            if (inputText) {
                doEncrypt();
            } else {
                document.getElementById('resultBox').textContent = '等待生成……';
            }
        }

        async function doEncrypt() {
            const input = document.getElementById('inputText').value;
            if (!input.trim()) {
                document.getElementById('resultBox').textContent = '等待生成……';
                showToast('请先输入内容');
                return;
            }

            const isUpper = document.getElementById('uppercaseCheck').checked;
            const resultBox = document.getElementById('resultBox');
            resultBox.textContent = '加密中...';

            try {
                let hash;
                const msgBuffer = new TextEncoder().encode(input);

                if (currentAlgo === 'MD5') {
                    hash = await crypto.subtle.digest('MD5', msgBuffer).catch(() => null);
                    if (!hash) {
                        resultBox.textContent = md5(input);
                        if (isUpper) resultBox.textContent = resultBox.textContent.toUpperCase();
                        return;
                    }
                } else if (currentAlgo === 'SHA-1') {
                    hash = await crypto.subtle.digest('SHA-1', msgBuffer);
                } else {
                    hash = await crypto.subtle.digest('SHA-256', msgBuffer);
                }

                const hashArray = Array.from(new Uint8Array(hash));
                let hex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                if (isUpper) hex = hex.toUpperCase();
                resultBox.textContent = hex;
            } catch (e) {
                if (currentAlgo === 'MD5') {
                    let hex = md5(input);
                    if (isUpper) hex = hex.toUpperCase();
                    resultBox.textContent = hex;
                } else {
                    resultBox.textContent = '加密失败，请重试';
                }
            }
        }

        function copyResult() {
            const text = document.getElementById('resultBox').textContent;
            if (!text || text === '加密中...' || text === '等待生成……') {
                showToast('没有可复制的结果');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板');
            }).catch(() => showToast('复制失败，请手动复制'));
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('resultBox').textContent = '等待生成……';
            showToast('已清空');
        }

        // 纯 JS MD5（保持不变）
        function md5(string) {
            function rotateLeft(lValue, iShiftBits) {
                return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits));
            }
            function addUnsigned(lX, lY) {
                let lX8 = lX & 0x80000000, lY8 = lY & 0x80000000;
                let lX4 = lX & 0x40000000, lY4 = lY & 0x40000000;
                let lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
                if (lX4 & lY4) return lResult ^ 0x80000000 ^ lX8 ^ lY8;
                if (lX4 | lY4) {
                    if (lResult & 0x40000000) return lResult ^ 0xC0000000 ^ lX8 ^ lY8;
                    else return lResult ^ 0x40000000 ^ lX8 ^ lY8;
                } else return lResult ^ lX8 ^ lY8;
            }
            function fF(x, y, z) { return (x & y) | ((~x) & z); }
            function fG(x, y, z) { return (x & z) | (y & (~z)); }
            function fH(x, y, z) { return x ^ y ^ z; }
            function fI(x, y, z) { return y ^ (x | (~z)); }
            function ff(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(fF(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function gg(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(fG(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function hh(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(fH(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function ii(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(fI(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function convertToWordArray(str) {
                let wordCount = (((str.length + 8) - ((str.length + 8) % 64)) / 64 + 1) * 16;
                let wordArray = new Array(wordCount - 1);
                let bytePosition = 0, byteCount = 0;
                while (byteCount < str.length) {
                    wordArray[bytePosition >> 2] |= str.charCodeAt(byteCount) << ((bytePosition % 4) * 8);
                    bytePosition++;
                    byteCount++;
                }
                wordArray[bytePosition >> 2] |= 0x80 << ((bytePosition % 4) * 8);
                wordArray[wordCount - 2] = str.length << 3;
                wordArray[wordCount - 1] = str.length >>> 29;
                return wordArray;
            }
            function wordToHex(lValue) {
                let hex = '';
                for (let i = 0; i <= 3; i++) {
                    hex += ((lValue >>> (i * 8)) & 0xFF).toString(16).padStart(2, '0');
                }
                return hex;
            }

            let x = convertToWordArray(string);
            let a = 0x67452301, b = 0xEFCDAB89, c = 0x98BADCFE, d = 0x10325476;

            for (let k = 0; k < x.length; k += 16) {
                let AA = a, BB = b, CC = c, DD = d;
                a = ff(a, b, c, d, x[k], 7, 0xD76AA478);
                d = ff(d, a, b, c, x[k + 1], 12, 0xE8C7B756);
                c = ff(c, d, a, b, x[k + 2], 17, 0x242070DB);
                b = ff(b, c, d, a, x[k + 3], 22, 0xC1BDCEEE);
                a = ff(a, b, c, d, x[k + 4], 7, 0xF57C0FAF);
                d = ff(d, a, b, c, x[k + 5], 12, 0x4787C62A);
                c = ff(c, d, a, b, x[k + 6], 17, 0xA8304613);
                b = ff(b, c, d, a, x[k + 7], 22, 0xFD469501);
                a = ff(a, b, c, d, x[k + 8], 7, 0x698098D8);
                d = ff(d, a, b, c, x[k + 9], 12, 0x8B44F7AF);
                c = ff(c, d, a, b, x[k + 10], 17, 0xFFFF5BB1);
                b = ff(b, c, d, a, x[k + 11], 22, 0x895CD7BE);
                a = ff(a, b, c, d, x[k + 12], 7, 0x6B901122);
                d = ff(d, a, b, c, x[k + 13], 12, 0xFD987193);
                c = ff(c, d, a, b, x[k + 14], 17, 0xA679438E);
                b = ff(b, c, d, a, x[k + 15], 22, 0x49B40821);
                a = gg(a, b, c, d, x[k + 1], 5, 0xF61E2562);
                d = gg(d, a, b, c, x[k + 6], 9, 0xC040B340);
                c = gg(c, d, a, b, x[k + 11], 14, 0x265E5A51);
                b = gg(b, c, d, a, x[k], 20, 0xE9B6C7AA);
                a = gg(a, b, c, d, x[k + 5], 5, 0xD62F105D);
                d = gg(d, a, b, c, x[k + 10], 9, 0x02441453);
                c = gg(c, d, a, b, x[k + 15], 14, 0xD8A1E681);
                b = gg(b, c, d, a, x[k + 4], 20, 0xE7D3FBC8);
                a = gg(a, b, c, d, x[k + 9], 5, 0x21E1CDE6);
                d = gg(d, a, b, c, x[k + 14], 9, 0xC33707D6);
                c = gg(c, d, a, b, x[k + 3], 14, 0xF4D50D87);
                b = gg(b, c, d, a, x[k + 8], 20, 0x455A14ED);
                a = gg(a, b, c, d, x[k + 13], 5, 0xA9E3E905);
                d = gg(d, a, b, c, x[k + 2], 9, 0xFCEFA3F8);
                c = gg(c, d, a, b, x[k + 7], 14, 0x676F02D9);
                b = gg(b, c, d, a, x[k + 12], 20, 0x8D2A4C8A);
                a = hh(a, b, c, d, x[k + 5], 4, 0xFFFA3942);
                d = hh(d, a, b, c, x[k + 8], 11, 0x8771F681);
                c = hh(c, d, a, b, x[k + 11], 16, 0x6D9D6122);
                b = hh(b, c, d, a, x[k + 14], 23, 0xFDE5380C);
                a = hh(a, b, c, d, x[k + 1], 4, 0xA4BEEA44);
                d = hh(d, a, b, c, x[k + 4], 11, 0x4BDECFA9);
                c = hh(c, d, a, b, x[k + 7], 16, 0xF6BB4B60);
                b = hh(b, c, d, a, x[k + 10], 23, 0xBEBFBC70);
                a = hh(a, b, c, d, x[k + 13], 4, 0x289B7EC6);
                d = hh(d, a, b, c, x[k], 11, 0xEAA127FA);
                c = hh(c, d, a, b, x[k + 3], 16, 0xD4EF3085);
                b = hh(b, c, d, a, x[k + 6], 23, 0x04881D05);
                a = hh(a, b, c, d, x[k + 9], 4, 0xD9D4D039);
                d = hh(d, a, b, c, x[k + 12], 11, 0xE6DB99E5);
                c = hh(c, d, a, b, x[k + 15], 16, 0x1FA27CF8);
                b = hh(b, c, d, a, x[k + 2], 23, 0xC4AC5665);
                a = ii(a, b, c, d, x[k], 6, 0xF4292244);
                d = ii(d, a, b, c, x[k + 7], 10, 0x432AFF97);
                c = ii(c, d, a, b, x[k + 14], 15, 0xAB9423A7);
                b = ii(b, c, d, a, x[k + 5], 21, 0xFC93A039);
                a = ii(a, b, c, d, x[k + 12], 6, 0x655B59C3);
                d = ii(d, a, b, c, x[k + 3], 10, 0x8F0CCC92);
                c = ii(c, d, a, b, x[k + 10], 15, 0xFFEFF47D);
                b = ii(b, c, d, a, x[k + 1], 21, 0x85845DD1);
                a = ii(a, b, c, d, x[k + 8], 6, 0x6FA87E4F);
                d = ii(d, a, b, c, x[k + 15], 10, 0xFE2CE6E0);
                c = ii(c, d, a, b, x[k + 6], 15, 0xA3014314);
                b = ii(b, c, d, a, x[k + 13], 21, 0x4E0811A1);
                a = ii(a, b, c, d, x[k + 4], 6, 0xF7537E82);
                d = ii(d, a, b, c, x[k + 11], 10, 0xBD3AF235);
                c = ii(c, d, a, b, x[k + 2], 15, 0x2AD7D2BB);
                b = ii(b, c, d, a, x[k + 9], 21, 0xEB86D391);
                a = addUnsigned(a, AA);
                b = addUnsigned(b, BB);
                c = addUnsigned(c, CC);
                d = addUnsigned(d, DD);
            }
            return (wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d)).toLowerCase();
        }
    </script>
