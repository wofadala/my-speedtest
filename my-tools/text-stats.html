<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>文本统计分析 - 更直观</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e8f4ff, #dcecff);
            font-family: 'Segoe UI', system-ui;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 28px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 100, 255, 0.15);
        }

        h1 {
            font-size: 1.9rem;
            background: linear-gradient(135deg, #1a6dd4, #0f4e8a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 12px;
        }

        .sub {
            text-align: center;
            color: #4f6f8f;
            margin-bottom: 28px;
            font-size: 0.85rem;
        }

        textarea {
            width: 100%;
            height: 260px;
            padding: 18px;
            font-family: monospace;
            font-size: 15px;
            line-height: 1.5;
            border: 1px solid #c2d6ed;
            border-radius: 32px;
            background: #fefefe;
            resize: vertical;
            outline: none;
        }

        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 28px;
        }

        .stat-card {
            background: #f5f9ff;
            border-radius: 32px;
            padding: 20px 16px;
            flex: 1;
            min-width: 140px;
            text-align: center;
            border: 1px solid #d4e4fc;
        }

        .stat-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #2c6e9e;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a4d7a;
            font-family: monospace;
        }

        .stat-note {
            font-size: 0.7rem;
            color: #6f8faf;
            margin-top: 6px;
        }

        footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.7rem;
            color: #8aadcc;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📊 文本统计分析</h1>
    <div class="sub">实时统计 · 一目了然</div>

    <textarea id="textInput" placeholder="请输入或粘贴文本..."></textarea>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">📖 总字符数</div>
            <div class="stat-value"><span id="charCount">0</span></div>
            <div class="stat-note">含换行、空格、标点</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">🔤 汉字/字母数</div>
            <div class="stat-value"><span id="letterCount">0</span></div>
            <div class="stat-note">不含标点、空格</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">📌 内容块数量</div>
            <div class="stat-value"><span id="blockCount">0</span></div>
            <div class="stat-note">连续汉字/英文/数字算1块</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">➡️ 行数</div>
            <div class="stat-value"><span id="lineCount">0</span></div>
            <div class="stat-note">换行分隔</div>
        </div>
    </div>
    <footer>✅ “内容块数量” = 连续的汉字/英文单词/数字的个数，不依赖空格。</footer>
</div>

<script>
    const textarea = document.getElementById('textInput');
    const charSpan = document.getElementById('charCount');
    const letterSpan = document.getElementById('letterCount');
    const blockSpan = document.getElementById('blockCount');
    const lineSpan = document.getElementById('lineCount');

    function analyzeText() {
        let raw = textarea.value;
        if (!raw) raw = '';

        const totalChars = raw.length;

        const lettersMatches = raw.match(/[\u4e00-\u9fa5a-zA-Z0-9]/g);
        const letterCount = lettersMatches ? lettersMatches.length : 0;

        const wordMatches = raw.match(/[\u4e00-\u9fa5a-zA-Z0-9]+/g);
        const blockCount = wordMatches ? wordMatches.length : 0;

        const lines = raw.split(/\r?\n/);
        const lineCount = raw.length === 0 ? 0 : lines.length;

        charSpan.innerText = totalChars;
        letterSpan.innerText = letterCount;
        blockSpan.innerText = blockCount;
        lineSpan.innerText = lineCount;
    }

    textarea.addEventListener('input', analyzeText);
    analyzeText();
</script>
</body>
</html>
