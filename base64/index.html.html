<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 编码 / 解码工具</title>
    <style>
        :root {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --bg-output: #f0fdf6;
            --border: #e2e8f0;
            --border-focus: #94a3b8;
            --border-output: #cbd5e1;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --text-placeholder: #94a3b8;
            --accent-encode: #3b82f6;
            --accent-encode-hover: #2563eb;
            --accent-encode-active: #1d4ed8;
            --accent-decode: #10b981;
            --accent-decode-hover: #059669;
            --accent-decode-active: #047857;
            --accent-copy: #6366f1;
            --accent-copy-hover: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --error-bg: #fef2f2;
            --error-border: #fecaca;
            --warning: #f59e0b;
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.04);
            --shadow-glow-encode: 0 0 0 3px rgba(59, 130, 246, 0.12);
            --shadow-glow-decode: 0 0 0 3px rgba(16, 185, 129, 0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', 'Source Code Pro', 'Fira Code',
                monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei',
                'Helvetica Neue', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }

        body {
            min-height: 100%;
            background: var(--bg-body);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(59, 130, 246, 0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 85%, rgba(16, 185, 129, 0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(99, 102, 241, 0.02) 0%, transparent 60%);
            color: var(--text-primary);
            font-family: var(--font-sans);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 40px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            max-width: 880px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ========== Header ========== */
        .header {
            text-align: center;
            padding: 8px 0 0;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #dbeafe 0%, #d1fae5 100%);
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            font-size: 22px;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.1);
            position: relative;
        }

        .header-badge::after {
            content: '64';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-weight: 800;
            font-size: 16px;
            color: #3b82f6;
            letter-spacing: -0.5px;
        }

        .title {
            font-size: clamp(1.5rem, 3.2vw, 1.9rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1e293b;
            margin: 0;
            line-height: 1.25;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
            letter-spacing: 0.02em;
            font-weight: 400;
        }

        /* ========== Main Card ========== */
        .main-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 22px;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all var(--transition-normal);
        }

        .main-card.output-active {
            border-color: #cbd5e1;
            box-shadow: var(--shadow-lg);
        }

        .main-card.output-error-state {
            border-color: var(--error-border);
            background: #fffbfb;
            box-shadow: var(--shadow-md), 0 0 0 1px rgba(239, 68, 68, 0.08);
        }

        /* ========== Textarea ========== */
        .textarea-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .textarea-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.03em;
            text-transform: uppercase;
            user-select: none;
        }

        .char-badge {
            font-weight: 500;
            font-size: 0.72rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            background: #f1f5f9;
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            transition: all var(--transition-fast);
        }

        .char-badge.has-content {
            color: var(--text-secondary);
            border-color: #cbd5e1;
            background: #f8fafc;
        }

        .json-textarea {
            width: 100%;
            min-height: 200px;
            max-height: 450px;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.875rem;
            line-height: 1.6;
            padding: 14px 16px;
            resize: vertical;
            outline: none;
            transition: all var(--transition-normal);
            tab-size: 2;
            -moz-tab-size: 2;
        }

        .json-textarea:focus {
            border-color: #94a3b8;
            box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.1);
            background: #ffffff;
        }

        .json-textarea::placeholder {
            color: var(--text-placeholder);
            opacity: 0.7;
            font-style: italic;
            font-size: 0.82rem;
        }

        /* ========== Output Area ========== */
        .output-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            opacity: 0;
            transform: translateY(6px);
            transition: all var(--transition-normal);
            pointer-events: none;
            max-height: 0;
            overflow: hidden;
        }

        .output-section.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            max-height: 600px;
            margin-top: 2px;
        }

        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .output-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.03em;
            text-transform: uppercase;
            user-select: none;
        }

        .output-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .output-char-count {
            font-weight: 500;
            font-size: 0.72rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            background: #f1f5f9;
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            transition: all var(--transition-fast);
        }

        .output-char-count.has-content {
            color: var(--text-secondary);
            border-color: #cbd5e1;
            background: #f8fafc;
        }

        .btn-copy {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            background: #ffffff;
            color: var(--text-secondary);
            font-family: var(--font-sans);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            user-select: none;
            -webkit-user-select: none;
            outline: none;
            white-space: nowrap;
            letter-spacing: 0.01em;
        }

        .btn-copy:hover {
            border-color: var(--accent-copy);
            color: var(--accent-copy);
            background: #f5f3ff;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.1);
        }
        .btn-copy:active {
            transform: scale(0.95);
            border-color: var(--accent-copy-hover);
            background: #ede9fe;
        }
        .btn-copy:focus-visible {
            outline: 2px solid var(--accent-copy);
            outline-offset: 2px;
        }

        .btn-copy.copied {
            border-color: var(--success);
            color: var(--success);
            background: #ecfdf5;
            animation: copyPulse 0.5s ease-out;
        }

        @keyframes copyPulse {
            0% {
                box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.4);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
            }
            100% {
                box-shadow: 0 0 0 0px rgba(16, 185, 129, 0);
            }
        }

        .output-textarea {
            width: 100%;
            min-height: 120px;
            max-height: 350px;
            background: var(--bg-output);
            border: 2px solid #d1e7dd;
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.875rem;
            line-height: 1.6;
            padding: 14px 16px;
            resize: vertical;
            outline: none;
            transition: all var(--transition-normal);
            cursor: default;
            tab-size: 2;
            -moz-tab-size: 2;
        }

        .output-textarea:focus {
            border-color: #a7c7b9;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.06);
        }

        .output-textarea.output-error {
            background: var(--error-bg);
            border-color: var(--error-border);
            color: #b91c1c;
        }

        .output-textarea.output-success {
            background: #f0fdf6;
            border-color: #b7e4cf;
            color: #1e293b;
        }

        /* ========== Buttons Row ========== */
        .button-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 15px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
            outline: none;
            box-shadow: var(--shadow-sm);
        }

        .btn:active {
            transform: scale(0.96);
        }
        .btn:focus-visible {
            outline: 2.5px solid #334155;
            outline-offset: 2px;
        }

        /* Encode Button */
        .btn-encode {
            background: var(--accent-encode);
            color: #fff;
            box-shadow: 0 3px 12px rgba(59, 130, 246, 0.25);
        }
        .btn-encode:hover {
            background: var(--accent-encode-hover);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
            transform: translateY(-2px);
        }
        .btn-encode:active {
            background: var(--accent-encode-active);
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.25);
            transform: translateY(0) scale(0.97);
        }

        /* Decode Button */
        .btn-decode {
            background: var(--accent-decode);
            color: #fff;
            box-shadow: 0 3px 12px rgba(16, 185, 129, 0.25);
        }
        .btn-decode:hover {
            background: var(--accent-decode-hover);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
            transform: translateY(-2px);
        }
        .btn-decode:active {
            background: var(--accent-decode-active);
            box-shadow: 0 2px 6px rgba(16, 185, 129, 0.25);
            transform: translateY(0) scale(0.97);
        }

        .btn-icon {
            font-size: 1.25rem;
            line-height: 1;
            flex-shrink: 0;
        }

        /* ========== Status indicator ========== */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
            font-weight: 500;
            min-height: 20px;
            padding: 0 2px;
            transition: all var(--transition-fast);
            color: var(--text-muted);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            background: #cbd5e1;
        }

        .status-dot.idle {
            background: #cbd5e1;
        }
        .status-dot.processing {
            background: #f59e0b;
            animation: pulse-dot 0.7s infinite;
        }
        .status-dot.success {
            background: var(--success);
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.5);
        }
        .status-dot.error {
            background: var(--error);
            box-shadow: 0 0 6px rgba(239, 68, 68, 0.5);
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(1.7);
            }
        }

        /* ========== Footer ========== */
        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.55;
            letter-spacing: 0.02em;
            padding-top: 6px;
        }

        /* ========== Responsive ========== */
        @media (max-width: 640px) {
            body {
                padding: 14px 10px 30px;
            }
            .container {
                gap: 14px;
            }
            .main-card {
                padding: 14px 12px;
                gap: 12px;
                border-radius: var(--radius-md);
            }
            .json-textarea {
                min-height: 160px;
                max-height: 320px;
                font-size: 0.8rem;
                padding: 12px 14px;
                border-radius: var(--radius-sm);
            }
            .output-textarea {
                min-height: 100px;
                max-height: 260px;
                font-size: 0.8rem;
                padding: 12px 14px;
                border-radius: var(--radius-sm);
            }
            .button-row {
                gap: 10px;
            }
            .btn {
                padding: 13px 14px;
                font-size: 0.85rem;
                border-radius: 7px;
                min-width: 90px;
                gap: 5px;
            }
            .btn-icon {
                font-size: 1.1rem;
            }
            .title {
                font-size: 1.35rem;
            }
            .header-badge {
                width: 40px;
                height: 40px;
                margin-bottom: 10px;
                font-size: 18px;
            }
            .header-badge::after {
                font-size: 14px;
            }
            .textarea-label {
                font-size: 0.7rem;
            }
            .output-label {
                font-size: 0.7rem;
            }
            .btn-copy {
                font-size: 0.72rem;
                padding: 6px 10px;
            }
            .char-badge,
            .output-char-count {
                font-size: 0.68rem;
                padding: 2px 8px;
            }
        }

        @media (max-width: 380px) {
            .button-row {
                gap: 6px;
            }
            .btn {
                padding: 11px 8px;
                font-size: 0.75rem;
                letter-spacing: 0;
                min-width: 60px;
                gap: 3px;
            }
            .btn-icon {
                font-size: 0.9rem;
            }
            .json-textarea {
                min-height: 130px;
                font-size: 0.72rem;
                padding: 10px 12px;
            }
            .output-textarea {
                min-height: 80px;
                font-size: 0.72rem;
                padding: 10px 12px;
            }
            .main-card {
                padding: 10px 8px;
                gap: 10px;
            }
            .output-actions {
                gap: 4px;
            }
            .btn-copy {
                font-size: 0.68rem;
                padding: 5px 8px;
                gap: 3px;
            }
        }

        @media (min-width: 1024px) {
            .container {
                max-width: 920px;
            }
            .json-textarea {
                min-height: 220px;
                font-size: 0.9rem;
            }
            .output-textarea {
                min-height: 140px;
                font-size: 0.9rem;
            }
            .btn {
                font-size: 1rem;
                padding: 16px 24px;
            }
        }

        /* Scrollbar styling */
        .json-textarea::-webkit-scrollbar,
        .output-textarea::-webkit-scrollbar {
            width: 7px;
            height: 7px;
        }
        .json-textarea::-webkit-scrollbar-track,
        .output-textarea::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 4px;
        }
        .json-textarea::-webkit-scrollbar-thumb,
        .output-textarea::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        .json-textarea::-webkit-scrollbar-thumb:hover,
        .output-textarea::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
            background-clip: padding-box;
        }
        .json-textarea::-webkit-scrollbar-corner,
        .output-textarea::-webkit-scrollbar-corner {
            background: transparent;
        }

        .json-textarea,
        .output-textarea {
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        /* Selection */
        .json-textarea::selection,
        .output-textarea::selection {
            background: rgba(59, 130, 246, 0.18);
            color: inherit;
        }

        /* Subtle animation for output appearing */
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-badge" aria-hidden="true"></div>
            <h1 class="title">Base64 编码 / 解码工具</h1>
            <p class="subtitle">支持中文 · UTF-8 安全编码 · 一键复制结果</p>
        </header>

        <!-- Main Card -->
        <div class="main-card" id="mainCard">
            <!-- 输入区域 -->
            <div class="textarea-group">
                <label class="textarea-label" for="inputText">
                    📝 输入内容
                    <span class="char-badge" id="inputCharCount">0 字符</span>
                </label>
                <textarea
                    id="inputText"
                    class="json-textarea"
                    placeholder='在此输入要编码的文本，或粘贴 Base64 字符串进行解码…&#10;&#10;示例（编码）：Hello, 世界！&#10;示例（解码）：SGVsbG8sIOS4lueVjO+8gQ=='
                    spellcheck="false"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
            ></textarea>
        </div>

        <!-- 按钮行 -->
        <div class="button-row">
            <button class="btn btn-encode" id="btnEncode" title="将文本编码为 Base64（UTF-8 安全）">
                <span class="btn-icon">🔒</span> 编码 Encode
            </button>
            <button class="btn btn-decode" id="btnDecode" title="将 Base64 字符串解码为原始文本">
                <span class="btn-icon">🔓</span> 解码 Decode
            </button>
        </div>

        <!-- 状态指示器 -->
        <div class="status-bar" id="statusBar">
            <span class="status-dot idle" id="statusDot"></span>
            <span id="statusText">等待输入</span>
        </div>

        <!-- 输出区域 -->
        <div class="output-section" id="outputSection">
            <div class="output-header">
                <span class="output-label">📤 转换结果</span>
                <div class="output-actions">
                    <span class="output-char-count" id="outputCharCount">0 字符</span>
                    <button class="btn-copy" id="btnCopy" title="复制结果到剪贴板">
                        📋 复制
                    </button>
                </div>
            </div>
            <textarea
                id="outputText"
                class="output-textarea"
                placeholder="转换结果将显示在这里…"
                readonly
                spellcheck="false"
        ></textarea>
    </div>
</div>

<!-- Footer -->
<footer class="footer">
    支持标准 Base64 · UTF-8 编码保证中文正确 · ⌨️ 快捷键：Ctrl+Enter 编码 | Ctrl+Shift+Enter 解码
</footer>
</div>

<script>
    (function() {
        // ============ DOM 元素 ============
        const inputTextarea = document.getElementById('inputText');
        const outputTextarea = document.getElementById('outputText');
        const outputSection = document.getElementById('outputSection');
        const btnEncode = document.getElementById('btnEncode');
        const btnDecode = document.getElementById('btnDecode');
        const btnCopy = document.getElementById('btnCopy');
        const inputCharCount = document.getElementById('inputCharCount');
        const outputCharCount = document.getElementById('outputCharCount');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const statusBar = document.getElementById('statusBar');
        const mainCard = document.getElementById('mainCard');

        // ============ 状态 ============
        let lastOperation = null; // 'encode' | 'decode' | null
        let copyTimeout = null;

        // ============ 工具函数 ============

        /**
         * UTF-8 安全的 Base64 编码
         * 使用 TextEncoder 将字符串转为 UTF-8 字节，再进行 Base64 编码
         * @param {string} str - 原始字符串
         * @returns {string} Base64 编码结果
         */
        function utf8Base64Encode(str) {
            const encoder = new TextEncoder();
            const bytes = encoder.encode(str);
            // 将 Uint8Array 转为二进制字符串，再用 btoa 编码
            let binaryStr = '';
            const len = bytes.length;
            // 使用分块处理，避免大字符串拼接的性能问题
            const chunkSize = 8192;
            for (let i = 0; i < len; i += chunkSize) {
                const chunk = bytes.subarray(i, Math.min(i + chunkSize, len));
                binaryStr += String.fromCharCode.apply(null, chunk);
            }
            return btoa(binaryStr);
        }

        /**
         * UTF-8 安全的 Base64 解码
         * 使用 atob 解码 Base64，再用 TextDecoder 将 UTF-8 字节转回字符串
         * @param {string} base64Str - Base64 编码的字符串
         * @returns {{success: boolean, result?: string, error?: string}}
         */
        function utf8Base64Decode(base64Str) {
            // 清理输入：去除所有空白字符
            let cleaned = base64Str.replace(/\s/g, '');

            if (!cleaned) {
                return { success: false, error: '输入为空，请粘贴 Base64 字符串' };
            }

            // 自动处理 URL 安全的 Base64（将 - 替换为 +，将 _ 替换为 /）
            const hasUrlSafe = cleaned.includes('-') || cleaned.includes('_');
            if (hasUrlSafe) {
                cleaned = cleaned.replace(/-/g, '+').replace(/_/g, '/');
            }

            // 验证 Base64 字符集：仅允许 A-Z a-z 0-9 + / = 
            const base64Regex = /^[A-Za-z0-9+/]*={0,2}$/;
            if (!base64Regex.test(cleaned)) {
                return {
                    success: false,
                    error: '输入包含无效的 Base64 字符。\n允许的字符：A-Z a-z 0-9 + / =\n' +
                        (hasUrlSafe ? '（已自动将 URL 安全的 -_ 转换为 +/）' : '')
                };
            }

            // 验证长度（Base64 长度必须是 4 的倍数，除非有填充）
            if (cleaned.length % 4 !== 0) {
                return {
                    success: false,
                    error: 'Base64 字符串长度不正确。\n长度应为 4 的倍数，当前长度为 ' + cleaned.length +
                        '。\n请检查是否缺少填充字符 "=" 或有多余字符。'
                };
            }

            // 尝试解码
            let binaryStr;
            try {
                binaryStr = atob(cleaned);
            } catch (e) {
                return {
                    success: false,
                    error: 'Base64 解码失败：' + e.message + '\n请检查输入是否为有效的 Base64 字符串。'
                };
            }

            // 将二进制字符串转为 Uint8Array
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) {
                bytes[i] = binaryStr.charCodeAt(i);
            }

            // 使用 TextDecoder 解码 UTF-8 字节
            try {
                const decoder = new TextDecoder('utf-8', { fatal: true });
                const result = decoder.decode(bytes);
                return { success: true, result };
            } catch (e) {
                // 如果 UTF-8 解码失败（fatal模式），可能是二进制数据
                // 尝试非fatal模式（会替换无效字节为  ）
                try {
                    const decoder = new TextDecoder('utf-8', { fatal: false });
                    const result = decoder.decode(bytes);
                    if (result.includes('\uFFFD')) {
                        return {
                            success: false,
                            error: '解码后的内容包含无法识别的字符。\n该 Base64 可能编码的是二进制数据而非文本。\n已尝试解码，但结果可能不完整。'
                        };
                    }
                    return { success: true, result, warning: '部分字符可能无法正确显示' };
                } catch (e2) {
                    return {
                        success: false,
                        error: 'UTF-8 解码失败：' + e2.message + '\n该 Base64 可能不是有效的 UTF-8 文本。'
                    };
                }
            }
        }

        /**
         * 更新输入字符计数
         */
        function updateInputCharCount() {
            const len = inputTextarea.value.length;
            if (len >= 10000) {
                inputCharCount.textContent = (len / 1000).toFixed(1) + 'k 字符';
            } else {
                inputCharCount.textContent = len.toLocaleString() + ' 字符';
            }
            if (len > 0) {
                inputCharCount.classList.add('has-content');
            } else {
                inputCharCount.classList.remove('has-content');
            }
        }

        /**
         * 更新输出字符计数
         */
        function updateOutputCharCount(text) {
            const len = text ? text.length : 0;
            if (len >= 10000) {
                outputCharCount.textContent = (len / 1000).toFixed(1) + 'k 字符';
            } else {
                outputCharCount.textContent = len.toLocaleString() + ' 字符';
            }
            if (len > 0) {
                outputCharCount.classList.add('has-content');
            } else {
                outputCharCount.classList.remove('has-content');
            }
        }

        /**
         * 设置状态指示器
         */
        function setStatus(type, message) {
            statusDot.className = 'status-dot ' + type;
            statusText.textContent = message;
        }

        /**
         * 显示输出区域
         */
        function showOutput() {
            outputSection.classList.add('visible');
        }

        /**
         * 隐藏输出区域
         */
        function hideOutput() {
            outputSection.classList.remove('visible');
        }

        /**
         * 设置输出成功样式
         */
        function setOutputSuccessStyle() {
            outputTextarea.classList.remove('output-error');
            outputTextarea.classList.add('output-success');
            mainCard.classList.remove('output-error-state');
            mainCard.classList.add('output-active');
        }

        /**
         * 设置输出错误样式
         */
        function setOutputErrorStyle() {
            outputTextarea.classList.remove('output-success');
            outputTextarea.classList.add('output-error');
            mainCard.classList.add('output-error-state');
            mainCard.classList.remove('output-active');
        }

        /**
         * 清除输出样式
         */
        function clearOutputStyle() {
            outputTextarea.classList.remove('output-success', 'output-error');
            mainCard.classList.remove('output-error-state', 'output-active');
        }

        /**
         * 复制文本到剪贴板
         */
        async function copyToClipboard(text) {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                    return true;
                }
            } catch (e) {
                // 回退到传统方式
            }
            // 传统回退方案
            try {
                const tempTextarea = document.createElement('textarea');
                tempTextarea.value = text;
                tempTextarea.style.position = 'fixed';
                tempTextarea.style.opacity = '0';
                tempTextarea.style.pointerEvents = 'none';
                document.body.appendChild(tempTextarea);
                tempTextarea.select();
                tempTextarea.setSelectionRange(0, 999999);
                const success = document.execCommand('copy');
                document.body.removeChild(tempTextarea);
                return success;
            } catch (e) {
                return false;
            }
        }

        /**
         * 触发复制按钮的视觉反馈
         */
        function triggerCopyFeedback(success) {
            if (copyTimeout) clearTimeout(copyTimeout);
            if (success) {
                btnCopy.classList.add('copied');
                const originalHTML = btnCopy.innerHTML;
                btnCopy.innerHTML = '✅ 已复制';
                copyTimeout = setTimeout(() => {
                    btnCopy.classList.remove('copied');
                    btnCopy.innerHTML = originalHTML;
                }, 1800);
            } else {
                btnCopy.classList.add('copied');
                btnCopy.style.borderColor = '#ef4444';
                btnCopy.style.color = '#ef4444';
                btnCopy.style.background = '#fef2f2';
                const originalHTML = btnCopy.innerHTML;
                btnCopy.innerHTML = '❌ 失败';
                copyTimeout = setTimeout(() => {
                    btnCopy.classList.remove('copied');
                    btnCopy.style.borderColor = '';
                    btnCopy.style.color = '';
                    btnCopy.style.background = '';
                    btnCopy.innerHTML = originalHTML;
                }, 1800);
            }
        }

        // ============ 核心操作 ============

        /**
         * 编码操作
         */
        function actionEncode() {
            const inputText = inputTextarea.value;
            lastOperation = 'encode';
            setStatus('processing', '正在编码…');
            clearOutputStyle();

            if (!inputText) {
                outputTextarea.value = '⚠️ 输入为空，请输入需要编码的文本。';
                setOutputErrorStyle();
                showOutput();
                updateOutputCharCount(outputTextarea.value);
                setStatus('error', '编码失败：输入为空');
                return;
            }

            try {
                const encoded = utf8Base64Encode(inputText);
                outputTextarea.value = encoded;
                setOutputSuccessStyle();
                showOutput();
                updateOutputCharCount(encoded);
                setStatus('success', '编码成功 ✓（' + encoded.length.toLocaleString() + ' 字符）');
            } catch (e) {
                outputTextarea.value = '❌ 编码失败：' + e.message;
                setOutputErrorStyle();
                showOutput();
                updateOutputCharCount(outputTextarea.value);
                setStatus('error', '编码失败');
            }
        }

        /**
         * 解码操作
         */
        function actionDecode() {
            const inputText = inputTextarea.value;
            lastOperation = 'decode';
            setStatus('processing', '正在解码…');
            clearOutputStyle();

            if (!inputText.trim()) {
                outputTextarea.value = '⚠️ 输入为空，请粘贴需要解码的 Base64 字符串。';
                setOutputErrorStyle();
                showOutput();
                updateOutputCharCount(outputTextarea.value);
                setStatus('error', '解码失败：输入为空');
                return;
            }

            const decoded = utf8Base64Decode(inputText);

            if (!decoded.success) {
                outputTextarea.value = '❌ 解码失败\n\n' + decoded.error;
                setOutputErrorStyle();
                showOutput();
                updateOutputCharCount(outputTextarea.value);
                setStatus('error', '解码失败：格式错误');
                return;
            }

            outputTextarea.value = decoded.result;
            setOutputSuccessStyle();
            showOutput();
            updateOutputCharCount(decoded.result);
            let statusMsg = '解码成功 ✓（' + decoded.result.length.toLocaleString() + ' 字符）';
            if (decoded.warning) {
                statusMsg += ' ⚠️ ' + decoded.warning;
            }
            setStatus('success', statusMsg);
        }

        /**
         * 复制结果
         */
        async function actionCopy() {
            const outputText = outputTextarea.value;
            if (!outputText) {
                triggerCopyFeedback(false);
                return;
            }
            const success = await copyToClipboard(outputText);
            triggerCopyFeedback(success);
            if (success) {
                setStatus('success', '已复制到剪贴板 ✓');
            } else {
                setStatus('error', '复制失败，请手动选择复制');
            }
        }

        // ============ 事件监听 ============

        // 输入框变化
        inputTextarea.addEventListener('input', function() {
            updateInputCharCount();
            // 如果用户修改了输入，清除之前的输出状态（但不隐藏输出区域）
            if (lastOperation && outputTextarea.value) {
                clearOutputStyle();
                setStatus('idle', '输入已更改，等待操作');
                lastOperation = null;
            }
            if (!inputTextarea.value.trim() && !outputTextarea.value) {
                setStatus('idle', '等待输入');
                lastOperation = null;
                clearOutputStyle();
            }
        });

        // 编码按钮
        btnEncode.addEventListener('click', actionEncode);

        // 解码按钮
        btnDecode.addEventListener('click', actionDecode);

        // 复制按钮
        btnCopy.addEventListener('click', actionCopy);

        // ============ 键盘快捷键 ============
        document.addEventListener('keydown', function(e) {
            // Ctrl/Cmd + Enter：编码
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (document.activeElement === inputTextarea ||
                    document.activeElement === outputTextarea ||
                    document.activeElement === document.body ||
                    document.activeElement === btnEncode ||
                    document.activeElement === btnDecode) {
                    actionEncode();
                }
            }
            // Ctrl/Cmd + Shift + Enter：解码
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'Enter') {
                e.preventDefault();
                if (document.activeElement === inputTextarea ||
                    document.activeElement === outputTextarea ||
                    document.activeElement === document.body ||
                    document.activeElement === btnEncode ||
                    document.activeElement === btnDecode) {
                    actionDecode();
                }
            }
        });

        // 输出区域点击时自动全选（方便复制）
        outputTextarea.addEventListener('click', function() {
            if (outputTextarea.value) {
                outputTextarea.select();
            }
        });

        // ============ 初始化 ============
        updateInputCharCount();
        updateOutputCharCount('');
        setStatus('idle', '等待输入');
        hideOutput();

        // 如果 URL hash 中有数据，尝试加载
        if (window.location.hash && window.location.hash.length > 1) {
            try {
                const decoded = decodeURIComponent(window.location.hash.substring(1));
                const trimmed = decoded.trim();
                if (trimmed) {
                    inputTextarea.value = decoded;
                    updateInputCharCount();
                    setStatus('idle', '已加载 URL 中的数据，请选择编码或解码');
                }
            } catch (e) {
                // 忽略解码错误
            }
        }

        console.log('🌿 Base64 编码 / 解码工具已就绪');
        console.log('   ⌨️  快捷键：');
        console.log('   Ctrl+Enter → 编码');
        console.log('   Ctrl+Shift+Enter → 解码');
        console.log('   📱 支持移动端和桌面端');
        console.log('   🌍 UTF-8 安全编码，完美支持中文');
    })();
</script>
</body>
</html>
