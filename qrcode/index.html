<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #e8f1fb;
            border-radius: 20px;
            padding: 28px 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            border: 2px solid #b0cde8;
            text-align: center;
        }
        h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: #5a6070; margin-bottom: 20px; }
        .section { margin-bottom: 14px; text-align: left; }
        .section label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #5a6070;
            margin-bottom: 6px;
        }
        textarea {
            width: 100%;
            height: 70px;
            border: 1px solid #b0cde8;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            font-family: 'SF Mono', 'Consolas', 'Microsoft YaHei', monospace;
            resize: vertical;
            color: #1a1a2e;
            background: #fff;
            transition: border 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #4a90d9;
        }
        #inputText::placeholder {
            color: #a0aab4;
            font-style: italic;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }
        button {
            flex: 1;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .btn-generate {
            background: #4a90d9;
            color: #fff;
        }
        .btn-generate:hover { background: #3d7ec4; }
        .btn-download {
            background: #4a90d9;
            color: #fff;
            flex: 0.5;
        }
        .btn-download:hover { background: #3d7ec4; }
        .btn-clear {
            background: #dce3eb;
            color: #5a6070;
            flex: 0.5;
        }
        .btn-clear:hover { background: #c8d3de; }

        .qr-preview {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #b0cde8;
            margin-bottom: 6px;
            position: relative;
            overflow: hidden;
        }
        .qr-preview img {
            max-width: 220px;
            max-height: 220px;
            padding: 10px;
        }
        .qr-placeholder {
            color: #a0aab4;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }
        .qr-generating {
            color: #4a90d9;
            font-size: 14px;
            text-align: center;
            padding: 20px;
            animation: pulse-text 1.2s ease-in-out infinite;
        }
        @keyframes pulse-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .size-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            font-size: 12px;
            color: #5a6070;
        }
        .size-row select {
            padding: 6px 10px;
            border: 1px solid #b0cde8;
            border-radius: 8px;
            font-size: 13px;
            background: #fff;
            color: #1a1a2e;
        }
        .custom-size-wrap {
            display: none;
            align-items: center;
            gap: 6px;
            margin-left: 4px;
        }
        .custom-size-wrap input {
            width: 70px;
            padding: 6px 8px;
            border: 1px solid #b0cde8;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1a1a2e;
            color: #fff;
            padding: 10px 22px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 700;
            z-index: 200;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 二维码生成器</h1>
        <p class="subtitle">输入文字或网址，一键生成二维码</p>

        <div class="section">
            <label>📥 输入内容</label>
            <textarea id="inputText" placeholder="请输入……"></textarea>
        </div>

        <div class="size-row">
            <span>尺寸：</span>
            <select id="sizeSelect" onchange="onSizeChange()">
                <option value="200">小 (200px)</option>
                <option value="260" selected>中 (260px)</option>
                <option value="350">大 (350px)</option>
                <option value="custom">自定义</option>
            </select>
            <span class="custom-size-wrap" id="customSizeWrap">
                <input type="number" id="customSizeInput" value="200" min="100" max="380" step="10" onchange="onCustomSizeChange()">
                <span>px</span>
            </span>
        </div>

        <div class="btn-row">
            <button class="btn-generate" onclick="doGenerate()">生成二维码</button>
            <button class="btn-download" onclick="downloadQR()">下载图片</button>
            <button class="btn-clear" onclick="clearAll()">清空</button>
        </div>

        <div class="qr-preview" id="qrPreview">
            <div class="qr-placeholder" id="qrPlaceholder">生成对应二维码</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function generateQRDataUrl(text, size) {
            const encoded = encodeURIComponent(text);
            return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encoded}`;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 1500);
        }

        function getCurrentSize() {
            const select = document.getElementById('sizeSelect');
            if (select.value === 'custom') {
                let val = parseInt(document.getElementById('customSizeInput').value);
                if (isNaN(val) || val < 100) val = 100;
                if (val > 380) val = 380;
                document.getElementById('customSizeInput').value = val;
                return val;
            }
            return parseInt(select.value);
        }

        function toggleCustomInput() {
            const select = document.getElementById('sizeSelect');
            const wrap = document.getElementById('customSizeWrap');
            wrap.style.display = select.value === 'custom' ? 'inline-flex' : 'none';
        }

        function onSizeChange() {
            toggleCustomInput();
            const qrPreview = document.getElementById('qrPreview');
            if (qrPreview.querySelector('img')) {
                doGenerate();
            }
        }

        function onCustomSizeChange() {
            const qrPreview = document.getElementById('qrPreview');
            if (qrPreview.querySelector('img')) {
                doGenerate();
            }
        }

        function doGenerate() {
            const input = document.getElementById('inputText').value.trim();
            const qrPreview = document.getElementById('qrPreview');
            const qrPlaceholder = document.getElementById('qrPlaceholder');
            const size = getCurrentSize();

            // 移除旧图片
            const oldImg = qrPreview.querySelector('img');
            if (oldImg) oldImg.remove();

            if (!input) {
                qrPlaceholder.style.display = 'block';
                qrPlaceholder.textContent = '生成对应二维码';
                qrPlaceholder.className = 'qr-placeholder';
                return;
            }

            // 👇 立即显示"生成中"提示
            qrPlaceholder.style.display = 'block';
            qrPlaceholder.textContent = '⏳ 二维码生成中……';
            qrPlaceholder.className = 'qr-generating';

            const img = document.createElement('img');
            img.alt = '二维码';
            img.style.display = 'none'; // 先隐藏，加载完成后再显示
            img.src = generateQRDataUrl(input, size);

            img.onload = function() {
                // 加载完成：隐藏提示，显示二维码
                qrPlaceholder.style.display = 'none';
                img.style.display = 'block';
                qrPreview.appendChild(img);
            };

            img.onerror = function() {
                qrPlaceholder.style.display = 'block';
                qrPlaceholder.textContent = '生成失败，请检查网络或内容';
                qrPlaceholder.className = 'qr-placeholder';
                img.remove();
            };

            // 先把图片添加到预览区（隐藏状态）
            qrPreview.appendChild(img);
        }

        function downloadQR() {
            const qrPreview = document.getElementById('qrPreview');
            const img = qrPreview.querySelector('img');
            if (!img || !img.src || img.style.display === 'none') {
                showToast('请先生成二维码');
                return;
            }

            fetch(img.src)
                .then(res => res.blob())
                .then(blob => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = 'qrcode.png';
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                    showToast('下载成功 ✓');
                })
                .catch(() => {
                    window.open(img.src, '_blank');
                    showToast('已在新窗口打开，请右键保存');
                });
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            const qrPreview = document.getElementById('qrPreview');
            const qrPlaceholder = document.getElementById('qrPlaceholder');
            const oldImg = qrPreview.querySelector('img');
            if (oldImg) oldImg.remove();
            qrPlaceholder.style.display = 'block';
            qrPlaceholder.textContent = '生成对应二维码';
            qrPlaceholder.className = 'qr-placeholder';
            showToast('已清空');
        }

        toggleCustomInput();
    </script>
</body>
<style>
    .feedback-fab {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #4a90d9;
        color: #fff;
        padding: 10px 16px;
        border-radius: 24px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 14px rgba(74,144,217,0.35);
        z-index: 999;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: transform 0.2s;
    }
    .feedback-fab:hover { transform: scale(1.05); }
</style>

</html>
