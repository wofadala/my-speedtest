<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>实用工具导航 | 5合1在线工具箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e8f4ff, #d4e6ff);
            font-family: 'Segoe UI', system-ui;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            flex: 1;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

        h1 {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #1a6dd4, #0f4e8a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .sub {
            color: #4f7092;
            font-size: 1rem;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .tool-card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: 0.2s;
            border: 1px solid rgba(0,100,255,0.1);
            display: flex;
            flex-direction: column;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.08);
        }

        .tool-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .tool-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1a4d7a;
            margin-bottom: 8px;
        }

        .tool-desc {
            color: #6f8faf;
            font-size: 0.85rem;
            margin-bottom: 16px;
            line-height: 1.4;
            flex: 1;
        }

        .tool-btn {
            background: linear-gradient(95deg, #1a6dd4, #0f4e8a);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            width: 100%;
            transition: filter 0.2s;
        }

        .tool-btn:hover {
            filter: brightness(1.05);
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: #7a9aba;
            font-size: 0.75rem;
            padding: 16px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🛠️ 实用工具导航</h1>
        <div class="sub">免费 · 干净 · 打开即用</div>
    </header>

    <div class="tools-grid" id="toolsGrid"></div>

    <footer>
        ⚡ 所有工具均在本地运行 · 不会上传你的任何数据
    </footer>
</div>

<script>
    const tools = [
        {
            icon: "⚡",
            name: "网速测试工具",
            desc: "测延迟、下载速度，带进度条",
            file: "speedtest.html"
        },
        {
            icon: "🔧",
            name: "JSON格式化工具",
            desc: "格式化 / 压缩 / 校验 JSON",
            file: "json-formatter.html"
        },
        {
            icon: "🔐",
            name: "Base64编码/解码",
            desc: "文本与Base64互转，支持中文",
            file: "base64.html"
        },
        {
            icon: "⏱️",
            name: "时间戳转换工具",
            desc: "秒级时间戳 ↔ 北京时间",
            file: "timestamp.html"
        },
        {
            icon: "📊",
            name: "文本统计分析",
            desc: "字符数 / 汉字数 / 内容块 / 行数",
            file: "text-stats.html"
        }
    ];

    const grid = document.getElementById("toolsGrid");
    tools.forEach(tool => {
        const card = document.createElement("div");
        card.className = "tool-card";
        card.innerHTML = `
            <div class="tool-icon">${tool.icon}</div>
            <div class="tool-title">${tool.name}</div>
            <div class="tool-desc">${tool.desc}</div>
            <button class="tool-btn" data-file="${tool.file}">打开工具</button>
        `;
        grid.appendChild(card);
    });

    document.querySelectorAll(".tool-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            const file = btn.dataset.file;
            window.location.href = file;
        });
    });
</script>
</body>
</html>
