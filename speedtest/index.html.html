<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>网速测试工具</title>
    <style>
        :root {
            --primary: #3d7ec4;
            --primary-light: #6ba3de;
            --primary-bg: #d0e3f7;
            --card-bg: #ffffff;
            --text-dark: #1a1a2e;
            --text-secondary: #5a6070;
            --text-light: #8a8f9f;
            --radius: 16px;
            --radius-sm: 12px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f0f3f6;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 👇 工具主体：蓝色背景 */
        .app-container {
            width: 100%;
            max-width: 530px;
            height: 100vh;
            height: 100dvh;
            background: #4a90d9;
            background-image: linear-gradient(160deg, #4a90d9 0%, #5e9edb 50%, #7ab4f0 100%);
            border-radius: 20px;
            box-shadow: 0 16px 44px rgba(0, 0, 0, 0.14);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ========== 全部内容区（整体下移 + 均匀分布） ========== */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 18px 20px 10px;
            gap: 10px;
            justify-content: space-between;
        }

        /* ========== 顶部标题 ========== */
        .header {
            text-align: center;
            flex-shrink: 0;
        }
        .header-title {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.10);
        }
        .header-subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            margin-top: 4px;
            letter-spacing: 0.8px;
        }

        /* ========== 仪表盘区 ========== */
        .meter-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .meter-ring-wrap {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .meter-ring-wrap:active .meter-center-btn {
            transform: translate(-50%, -50%) scale(0.94);
            background: #3569a8;
        }
        .meter-svg {
            width: 160px;
            height: 160px;
            transform: rotate(-90deg);
        }
        .meter-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.25);
            stroke-width: 9;
        }
        .meter-fg {
            fill: none;
            stroke: #ffffff;
            stroke-width: 9;
            stroke-linecap: round;
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.5));
            transition: stroke-dashoffset 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .meter-fg.testing {
            animation: progressGlow 0.75s ease-in-out infinite;
        }
        @keyframes progressGlow {
            0%,
            100% {
                stroke-width: 9;
            }
            50% {
                stroke-width: 14;
            }
        }

        .meter-center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: #ffffff;
            color: #3d7ec4;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.15);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            line-height: 1.2;
        }
        .meter-center-btn:disabled {
            background: #e8f0f8;
            color: #8aafd4;
            cursor: not-allowed;
            animation: btnPulse 1.2s ease-in-out infinite;
        }
        @keyframes btnPulse {
            0%,
            100% {
                box-shadow: 0 4px 18px rgba(0, 0, 0, 0.15);
            }
            50% {
                box-shadow: 0 4px 30px rgba(255, 255, 255, 0.45);
            }
        }
        .meter-center-btn .btn-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2.5px solid rgba(61, 126, 196, 0.3);
            border-top-color: #3d7ec4;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .meter-center-btn .btn-icon {
            font-size: 20px;
            line-height: 1;
        }
        .meter-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
            font-weight: 500;
        }

        /* ========== 四个指标：2×2 均匀网格 ========== */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 8px;
            width: 100%;
            flex-shrink: 0;
        }
        .metric-box {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-sm);
            padding: 10px 8px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .metric-box .m-label {
            font-size: 11px;
            color: #5a6070;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 3px;
        }
        .metric-box .m-value {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }
        .metric-box .m-value.m-dl {
            color: #3d7ec4;
        }
        .metric-box .m-value.m-ul {
            color: #e8962a;
        }
        .metric-box .m-traffic {
            font-size: 10px;
            color: #8a8f9f;
            margin-top: 2px;
        }

        /* ========== 场景体验 ========== */
        .exp-section {
            flex-shrink: 0;
        }
        .exp-section-title {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.90);
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            text-align: center;
        }
        .exp-row {
            display: flex;
            gap: 8px;
        }
        /* 👇 场景卡片加外框 */
        .exp-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-sm);
            padding: 12px 6px;
            box-shadow: var(--shadow-sm);
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.6);
        }
        .exp-card .exp-icon {
            font-size: 22px;
            margin-bottom: 3px;
        }
        .exp-card .exp-name {
            font-size: 12px;
            color: #5a6070;
            font-weight: 600;
            margin-bottom: 3px;
        }
        .exp-card .exp-value {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .exp-card .exp-grade {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 3px;
        }
        .grade-excellent {
            background: #d4f0e0;
            color: #0d8a4e;
        }
        .grade-good {
            background: #d9ecfe;
            color: #3076c9;
        }
        .grade-fair {
            background: #fef5d4;
            color: #c0780a;
        }
        .grade-poor {
            background: #fde4e4;
            color: #c0392b;
        }

        /* ========== 底部提示 ========== */
        .footer-note {
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
            flex-shrink: 0;
            padding-bottom: 4px;
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-110px);
            background: #1a1a2e;
            color: #fff;
            padding: 9px 20px;
            border-radius: 22px;
            font-size: 12px;
            font-weight: 700;
            z-index: 200;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 440px) {
            .app-container {
                max-width: 100%;
                border-radius: 0;
            }
            .content-wrapper {
                padding: 14px 14px 6px;
                gap: 7px;
            }
            .meter-ring-wrap {
                width: 140px;
                height: 140px;
            }
            .meter-svg {
                width: 140px;
                height: 140px;
            }
            .meter-bg {
                cx: 70;
                cy: 70;
                r: 60;
            }
            .meter-fg {
                cx: 70;
                cy: 70;
                r: 60;
            }
            .meter-center-btn {
                width: 72px;
                height: 72px;
                font-size: 12px;
            }
            .meter-center-btn .btn-icon {
                font-size: 17px;
            }
            .metric-box .m-value {
                font-size: 17px;
            }
            .exp-card .exp-value {
                font-size: 15px;
            }
            .metrics-grid {
                gap: 6px;
            }
            .exp-row {
                gap: 6px;
            }
        }

        @media (max-height: 680px) {
            .content-wrapper {
                padding: 8px 14px 4px;
                gap: 5px;
            }
            .header-title {
                font-size: 20px;
            }
            .meter-ring-wrap {
                width: 120px;
                height: 120px;
            }
            .meter-svg {
                width: 120px;
                height: 120px;
            }
            .meter-bg {
                cx: 60;
                cy: 60;
                r: 50;
            }
            .meter-fg {
                cx: 60;
                cy: 60;
                r: 50;
            }
            .meter-center-btn {
                width: 62px;
                height: 62px;
                font-size: 11px;
            }
            .meter-center-btn .btn-icon {
                font-size: 14px;
            }
            .metric-box {
                padding: 6px 4px;
            }
            .metric-box .m-value {
                font-size: 15px;
            }
            .exp-card {
                padding: 8px 4px;
            }
            .exp-card .exp-value {
                font-size: 14px;
            }
            .metrics-grid {
                gap: 4px;
            }
            .exp-row {
                gap: 4px;
            }
            .footer-note {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- 全部内容统一管理间距 -->
        <div class="content-wrapper">
            <!-- 顶部标题 -->
            <div class="header">
                <div class="header-title">网速测试工具</div>
                <div class="header-subtitle">一键测速 · 真实反馈</div>
            </div>

            <!-- 仪表盘 -->
            <div class="meter-section">
                <div class="meter-ring-wrap" onclick="startTest()">
                    <svg class="meter-svg" viewBox="0 0 160 160">
                        <circle class="meter-bg" cx="80" cy="80" r="68"/>
                        <circle class="meter-fg" id="meterFg" cx="80" cy="80" r="68"
                        stroke-dasharray="427.26" stroke-dashoffset="427.26"/>
                    </svg>
                    <button class="meter-center-btn" id="meterBtn" onclick="event.stopPropagation(); startTest();">
                        <span class="btn-icon">⚡</span>
                        测速
                    </button>
                </div>
                <div class="meter-hint" id="meterHint">点击中间按钮检测网速</div>
            </div>

            <!-- 四个指标：2×2 均匀网格 -->
            <div class="metrics-grid">
                <div class="metric-box">
                    <div class="m-label">下载速度</div>
                    <div class="m-value m-dl" id="metricDownload">--</div>
                    <div class="m-traffic" id="metricDLTraffic"></div>
                </div>
                <div class="metric-box">
                    <div class="m-label">上传速度</div>
                    <div class="m-value m-ul" id="metricUpload">--</div>
                    <div class="m-traffic" id="metricULTraffic"></div>
                </div>
                <div class="metric-box">
                    <div class="m-label">时延</div>
                    <div class="m-value" id="metricLatency">--</div>
                    <div class="m-traffic">ms</div>
                </div>
                <div class="metric-box">
                    <div class="m-label">抖动</div>
                    <div class="m-value" id="metricJitter" style="color:#e8962a;">--</div>
                    <div class="m-traffic">ms</div>
                </div>
            </div>

            <!-- 场景体验 -->
            <div class="exp-section">
                <div class="exp-section-title">🎯 场景体验测试</div>
                <div class="exp-row">
                    <div class="exp-card">
                        <div class="exp-icon">🎮</div>
                        <div class="exp-name">游戏测速</div>
                        <div class="exp-value" id="expGameVal">--</div>
                        <div class="exp-grade" id="expGameGrade" style="display:none;"></div>
                    </div>
                    <div class="exp-card">
                        <div class="exp-icon">📡</div>
                        <div class="exp-name">直播测速</div>
                        <div class="exp-value" id="expLiveVal">--</div>
                        <div class="exp-grade" id="expLiveGrade" style="display:none;"></div>
                    </div>
                    <div class="exp-card">
                        <div class="exp-icon">🎬</div>
                        <div class="exp-name">视频测速</div>
                        <div class="exp-value" id="expVideoVal">--</div>
                        <div class="exp-grade" id="expVideoGrade" style="display:none;"></div>
                    </div>
                </div>
            </div>

            <!-- 底部提示 -->
            <div class="footer-note">测速结果仅粗略评估 · 受网络环境影响</div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            const CIRC = 2 * Math.PI * 68;
            let testing = false;

            const $ = (id) => document.getElementById(id);

            function showToast(msg) {
                const t = $('toast');
                t.textContent = msg;
                t.classList.add('show');
                clearTimeout(t._timer);
                t._timer = setTimeout(() => t.classList.remove('show'), 1800);
            }

            function setProgress(fraction) {
                const clamped = Math.max(0, Math.min(1, fraction));
                $('meterFg').style.strokeDashoffset = CIRC * (1 - clamped);
            }

            function resetProgress() {
                const fg = $('meterFg');
                fg.classList.remove('testing');
                fg.style.transition = 'none';
                fg.style.strokeDashoffset = CIRC;
                fg.getBoundingClientRect();
                fg.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            }

            async function measureLatency(rounds = 5) {
                const results = [];
                for (let i = 0; i < rounds; i++) {
                    try {
                        const start = performance.now();
                        await fetch('https://speed.cloudflare.com/__down?bytes=0', {
                            method: 'HEAD',
                            cache: 'no-store',
                            signal: AbortSignal.timeout(4000)
                        });
                        results.push(performance.now() - start);
                    } catch {
                        try {
                            const start = performance.now();
                            await fetch('https://speed.cloudflare.com/__down?bytes=16', {
                                cache: 'no-store',
                                signal: AbortSignal.timeout(4000)
                            });
                            results.push(performance.now() - start);
                        } catch {
                            results.push(null);
                        }
                    }
                    if (i < rounds - 1) await new Promise(r => setTimeout(r, 100));
                }
                const valid = results.filter(r => r !== null);
                if (!valid.length) return { latency: null, jitter: null };
                const avg = valid.reduce((a, b) => a + b, 0) / valid.length;
                const jitter = valid.length > 1 ?
                    Math.sqrt(valid.map(v => (v - avg) ** 2).reduce((a, b) => a + b, 0) / (valid.length - 1)) : 0;
                return { latency: Math.round(avg), jitter: Math.round(jitter) };
            }

            async function downloadTest() {
                const sizes = [100000, 500000, 1000000, 2000000];
                let totalBytes = 0,
                    totalTime = 0;
                for (const size of sizes) {
                    try {
                        const start = performance.now();
                        const resp = await fetch('https://speed.cloudflare.com/__down?bytes=' + size, {
                            cache: 'no-store',
                            signal: AbortSignal.timeout(10000)
                        });
                        const data = await resp.arrayBuffer();
                        const dur = performance.now() - start;
                        if (data.byteLength > 0) { totalBytes += data.byteLength;
                            totalTime += dur; }
                        if (dur > 2500) break;
                    } catch { break; }
                }
                if (!totalBytes || !totalTime) return null;
                return {
                    speedMbps: (totalBytes * 8) / (totalTime / 1000) / 1e6,
                    trafficMB: totalBytes / 1e6
                };
            }

            async function uploadTest() {
                const sizes = [100000, 300000, 600000];
                let totalBytes = 0,
                    totalTime = 0;
                for (const size of sizes) {
                    try {
                        const payload = new Uint8Array(size);
                        const start = performance.now();
                        const resp = await fetch('https://speed.cloudflare.com/__up', {
                            method: 'POST',
                            body: payload,
                            signal: AbortSignal.timeout(10000)
                        });
                        if (resp.ok) { totalBytes += size;
                            totalTime += performance.now() - start; }
                    } catch { break; }
                }
                if (!totalBytes || !totalTime) return null;
                return {
                    speedMbps: (totalBytes * 8) / (totalTime / 1000) / 1e6,
                    trafficMB: totalBytes / 1e6
                };
            }

            function getGrade(ms) {
                if (ms <= 30) return { text: '极好', cls: 'grade-excellent' };
                if (ms <= 60) return { text: '良好', cls: 'grade-good' };
                if (ms <= 120) return { text: '一般', cls: 'grade-fair' };
                return { text: '较差', cls: 'grade-poor' };
            }

            window.startTest = async function() {
                if (testing) return;
                testing = true;

                const btn = $('meterBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="btn-spinner"></span>';

                $('meterFg').classList.add('testing');
                resetProgress();
                setProgress(0);

                $('meterHint').textContent = '测试中...';
                $('metricDownload').textContent = '...';
                $('metricDLTraffic').textContent = '';
                $('metricUpload').textContent = '...';
                $('metricULTraffic').textContent = '';
                $('metricLatency').textContent = '...';
                $('metricJitter').textContent = '...';
                $('expGameVal').textContent = '...';
                $('expGameGrade').style.display = 'none';
                $('expLiveVal').textContent = '...';
                $('expLiveGrade').style.display = 'none';
                $('expVideoVal').textContent = '...';
                $('expVideoGrade').style.display = 'none';

                let animFrame;
                let phase = 0;
                const animate = () => {
                    phase += 0.04;
                    setProgress(0.06 + Math.abs(Math.sin(phase * 2.5)) * 0.24);
                    animFrame = requestAnimationFrame(animate);
                };
                animFrame = requestAnimationFrame(animate);

                try {
                    const latRes = await measureLatency();
                    if (latRes.latency !== null) {
                        $('metricLatency').textContent = latRes.latency;
                        $('metricJitter').textContent = latRes.jitter;
                    } else {
                        $('metricLatency').textContent = '--';
                        $('metricJitter').textContent = '--';
                    }
                    setProgress(0.15);

                    const dlRes = await downloadTest();
                    if (dlRes) {
                        $('metricDownload').textContent = dlRes.speedMbps.toFixed(2);
                        $('metricDLTraffic').textContent = dlRes.trafficMB.toFixed(2) + ' M';
                        setProgress(Math.min(1, dlRes.speedMbps / 120));
                    } else {
                        $('metricDownload').textContent = '--';
                    }

                    const ulRes = await uploadTest();
                    if (ulRes) {
                        $('metricUpload').textContent = ulRes.speedMbps.toFixed(2);
                        $('metricULTraffic').textContent = ulRes.trafficMB.toFixed(2) + ' M';
                    } else {
                        $('metricUpload').textContent = '--';
                    }

                    $('meterHint').textContent = '测试完成';

                    const lat = latRes.latency || 60;
                    const jit = latRes.jitter || 20;

                    const g1 = getGrade(lat);
                    $('expGameVal').textContent = lat + 'ms';
                    $('expGameGrade').textContent = g1.text;
                    $('expGameGrade').className = 'exp-grade ' + g1.cls;
                    $('expGameGrade').style.display = 'inline-block';

                    const liveMs = Math.round(lat * 0.6 + jit * 0.4);
                    const g2 = getGrade(liveMs);
                    $('expLiveVal').textContent = liveMs + 'ms';
                    $('expLiveGrade').textContent = g2.text;
                    $('expLiveGrade').className = 'exp-grade ' + g2.cls;
                    $('expLiveGrade').style.display = 'inline-block';

                    const videoMs = Math.round(lat * 0.7);
                    const g3 = getGrade(videoMs);
                    $('expVideoVal').textContent = videoMs + 'ms';
                    $('expVideoGrade').textContent = g3.text;
                    $('expVideoGrade').className = 'exp-grade ' + g3.cls;
                    $('expVideoGrade').style.display = 'inline-block';

                } catch (e) {
                    showToast('测速异常，请重试');
                    $('meterHint').textContent = '点击中间按钮检测网速';
                } finally {
                    cancelAnimationFrame(animFrame);
                    $('meterFg').classList.remove('testing');
                    btn.disabled = false;
                    btn.innerHTML = '<span class="btn-icon">⚡</span>测速';
                    testing = false;
                }
            };

            resetProgress();
            setProgress(0);
        })();
    </script>
</body>
</html>
