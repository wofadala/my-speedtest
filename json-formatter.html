<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JSON在线工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 1000px;
            width: 100%;
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 28px 24px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #4d9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .sub {
            text-align: center;
            color: #8e9fc3;
            font-size: 0.75rem;
            margin-bottom: 24px;
            padding-bottom: 6px;
            border-bottom: 1px dashed rgba(0, 255, 255, 0.3);
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: #0b1020;
            border: 1px solid #1e2a4a;
            border-radius: 24px;
            padding: 16px;
            color: #ecf5ff;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: #00e0ff;
            box-shadow: 0 0 8px rgba(0, 224, 255, 0.3);
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
        }

        button {
            background: linear-gradient(95deg, #00c6ff, #0072ff);
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            box-shadow: 0 4px 12px rgba(0, 114, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .result-label {
            color: #8e9fc3;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .result-box {
            background: #0b1020;
            border: 1px solid #1e2a4a;
            border-radius: 24px;
            padding: 16px;
            min-height: 180px;
            color: #ecf5ff;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-x: auto;
        }

        .error {
            color: #ff8a8a;
            background: #1a0f0f;
            border-color: #ff5555;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #3a4a6e;
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px dashed #1f2a4a;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>⚡ JSON 在线工具</h1>
    <div class="sub">格式化 · 压缩 · 校验</div>

    <textarea id="jsonInput" placeholder='在此粘贴您的 JSON 数据...&#10;&#10;例如: {"name":"张三","age":25,"hobbies":["阅读","音乐"]}'></textarea>

    <div class="button-group">
        <button id="formatBtn">✨ 格式化</button>
        <button id="compressBtn">📦 压缩</button>
        <button id="validateBtn">🔍 校验</button>
    </div>

    <div class="result-label">📄 输出结果</div>
    <div class="result-box" id="output">等待输入...</div>
    <footer>支持标准JSON格式 · 自动检测错误位置</footer>
</div>

<script>
    const inputArea = document.getElementById('jsonInput');
    const outputDiv = document.getElementById('output');

    function formatJSON() {
        const raw = inputArea.value.trim();
        if (!raw) {
            outputDiv.innerHTML = '⚠️ 请输入 JSON 数据';
            outputDiv.classList.add('error');
            return;
        }
        try {
            const parsed = JSON.parse(raw);
            const formatted = JSON.stringify(parsed, null, 2);
            outputDiv.innerHTML = formatted;
            outputDiv.classList.remove('error');
        } catch (e) {
            outputDiv.innerHTML = `❌ JSON 格式错误：${e.message}`;
            outputDiv.classList.add('error');
        }
    }

    function compressJSON() {
        const raw = inputArea.value.trim();
        if (!raw) {
            outputDiv.innerHTML = '⚠️ 请输入 JSON 数据';
            outputDiv.classList.add('error');
            return;
        }
        try {
            const parsed = JSON.parse(raw);
            const compressed = JSON.stringify(parsed);
            outputDiv.innerHTML = compressed;
            outputDiv.classList.remove('error');
        } catch (e) {
            outputDiv.innerHTML = `❌ JSON 格式错误：${e.message}`;
            outputDiv.classList.add('error');
        }
    }

    function validateJSON() {
        const raw = inputArea.value.trim();
        if (!raw) {
            outputDiv.innerHTML = '⚠️ 请输入 JSON 数据';
            outputDiv.classList.add('error');
            return;
        }
        try {
            JSON.parse(raw);
            outputDiv.innerHTML = '✅ JSON 格式正确！';
            outputDiv.classList.remove('error');
        } catch (e) {
            outputDiv.innerHTML = `❌ 校验失败：${e.message}`;
            outputDiv.classList.add('error');
        }
    }

    document.getElementById('formatBtn').addEventListener('click', formatJSON);
    document.getElementById('compressBtn').addEventListener('click', compressJSON);
    document.getElementById('validateBtn').addEventListener('click', validateJSON);
</script>
</body>
</html>
