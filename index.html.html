<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-radius: 20px;
            padding: 30px 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            text-align: center;
        }
        h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: #8a8f9f; margin-bottom: 24px; }
        .result-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            word-break: break-all;
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 15px;
            color: #1a1a2e;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .result-box:hover { background: #f0f4f8; }
        .result-box:active { background: #e8ecf2; }
        .copy-hint {
            position: absolute;
            top: -10px;
            right: 10px;
            background: #4a90d9;
            color: #fff;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .copy-hint.show { opacity: 1; }
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: #4a90d9;
            color: #fff;
            flex: 1;
            min-width: 120px;
        }
        .btn-primary:hover { background: #3d7ec4; }
        .btn-secondary {
            background: #f0f4f8;
            color: #5a6070;
            flex: 1;
            min-width: 120px;
        }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-batch {
            background: #fff;
            color: #4a90d9;
            border: 2px solid #4a90d9;
            width: 100%;
            margin-top: 6px;
        }
        .btn-batch:hover { background: #e8f1fb; }
        .batch-list {
            margin-top: 16px;
            text-align: left;
        }
        .batch-list .batch-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 6px;
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 13px;
            color: #1a1a2e;
            word-break: break-all;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.15s;
        }
        .batch-item:hover { background: #f0f4f8; }
        .batch-item .batch-copy {
            background: #e8f1fb;
            color: #4a90d9;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
            margin-left: 10px;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1a1a2e;
            color: #fff;
            padding: 10px 22px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 700;
            z-index: 200;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🆔 UUID生成器</h1>
        <p class="subtitle">生成全局唯一标识符 · 点击复制</p>

        <div class="result-box" id="resultBox" onclick="copySingle()">
            <span id="uuidText">点击下方按钮生成</span>
            <div class="copy-hint" id="copyHint">已复制</div>
        </div>

        <div class="btn-row">
            <button class="btn-primary" onclick="generateOne()">生成一个</button>
            <button class="btn-secondary" onclick="copySingle()">复制</button>
        </div>
        <button class="btn-batch" onclick="generateBatch()">批量生成 10 个</button>

        <div class="batch-list" id="batchList"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 1500);
        }

        function showCopyHint() {
            const hint = document.getElementById('copyHint');
            hint.classList.add('show');
            setTimeout(() => hint.classList.remove('show'), 1000);
        }

        function generateOne() {
            const uuid = generateUUID();
            document.getElementById('uuidText').textContent = uuid;
        }

        function copySingle() {
            const text = document.getElementById('uuidText').textContent;
            if (text === '点击下方按钮生成') return;
            navigator.clipboard.writeText(text).then(() => {
                showCopyHint();
                showToast('已复制到剪贴板');
            }).catch(() => showToast('复制失败，请手动复制'));
        }

        function generateBatch() {
            const list = document.getElementById('batchList');
            list.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const uuid = generateUUID();
                const div = document.createElement('div');
                div.className = 'batch-item';
                div.innerHTML = `<span>${uuid}</span><span class="batch-copy">复制</span>`;
                div.onclick = function(e) {
                    if (e.target.classList.contains('batch-copy')) {
                        e.stopPropagation();
                    }
                    navigator.clipboard.writeText(uuid).then(() => showToast('已复制'));
                };
                list.appendChild(div);
            }
        }

        // 初始生成一个
        generateOne();
    </script>
</body>
</html>
